name: Debug - inspect real HCRIS S-3 Part I column layout

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Download FY2025 SNF cost report zip and inspect worksheet S300001 columns
        run: |
          curl -sSL "https://downloads.cms.gov/FILES/HCRIS/SNF10FY2025.ZIP" -o snf2025.zip -w "download HTTP %{http_code}\n"
          mkdir extracted
          unzip -o -q snf2025.zip -d extracted
          echo "=== extracted files ==="
          ls -la extracted

          NMRC=$(ls extracted/*NMRC*.csv extracted/*nmrc*.csv 2>/dev/null | head -1)
          RPT=$(ls extracted/*RPT*.csv extracted/*rpt*.csv 2>/dev/null | grep -iv alph | head -1)
          echo "NMRC file: $NMRC"
          echo "RPT file: $RPT"

          echo ""
          echo "=== line 00100 (candidate beds/bed-days line), per-column stats ==="
          awk -F, '$2=="S300001" && $3=="00100" { col=$4; val=$5+0; n[col]++; sum[col]+=val; if (!(col in mn) || val<mn[col]) mn[col]=val; if (!(col in mx) || val>mx[col]) mx[col]=val } END { for (c in n) printf "col=%s  n=%d  min=%s  max=%s  avg=%.1f\n", c, n[c], mn[c], mx[c], sum[c]/n[c] }' "$NMRC" | sort

          echo ""
          echo "=== line 00800 (candidate patient-days line), per-column stats ==="
          awk -F, '$2=="S300001" && $3=="00800" { col=$4; val=$5+0; n[col]++; sum[col]+=val; if (!(col in mn) || val<mn[col]) mn[col]=val; if (!(col in mx) || val>mx[col]) mx[col]=val } END { for (c in n) printf "col=%s  n=%d  min=%s  max=%s  avg=%.1f\n", c, n[c], mn[c], mx[c], sum[c]/n[c] }' "$NMRC" | sort

          echo ""
          echo "=== all distinct (line, col) pairs seen on worksheet S300001, with row counts ==="
          awk -F, '$2=="S300001" { print $3, $4 }' "$NMRC" | sort | uniq -c | sort -rn | head -40

          echo ""
          echo "=== sample raw rows for RPT_REC_NUM of the first report in the RPT file, worksheet S300001 only ==="
          FIRST_RPT=$(head -1 "$RPT" | cut -d, -f1)
          echo "first RPT_REC_NUM: $FIRST_RPT"
          awk -F, -v rpt="$FIRST_RPT" '$1==rpt && $2=="S300001"' "$NMRC" | sort -t, -k3,3 -k4,4

          echo ""
          echo "=== worksheet G300000 (financial), per-line/column stats for candidate revenue/expense/income lines ==="
          for LINE in 00100 00300 00400 00500; do
            echo "--- line $LINE ---"
            awk -F, -v line="$LINE" '$2=="G300000" && $3==line { col=$4; val=$5+0; n[col]++; sum[col]+=val; if (!(col in mn) || val<mn[col]) mn[col]=val; if (!(col in mx) || val>mx[col]) mx[col]=val } END { for (c in n) printf "col=%s  n=%d  min=%s  max=%s  avg=%.1f\n", c, n[c], mn[c], mx[c], sum[c]/n[c] }' "$NMRC" | sort
          done

          echo ""
          echo "=== sample raw rows for the same RPT_REC_NUM, worksheet G300000 only ==="
          awk -F, -v rpt="$FIRST_RPT" '$1==rpt && $2=="G300000"' "$NMRC" | sort -t, -k3,3 -k4,4
